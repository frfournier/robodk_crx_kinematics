services:
  robodk:
    image: robodk-local:latest
    build:
      context: ..
      dockerfile: .docker/Dockerfile
      target: runtime
    ports:
      - "${HOST_RDK_PORT:-20501}:20501"
    secrets:
      - source: robodk-license
        target: robodk-license
    restart: unless-stopped

secrets:
  robodk-license:
    file: "${ROBODK_LICENSE_SECRET_FILE:-./secrets/robodk-license.txt}"
